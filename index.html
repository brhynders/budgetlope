    <title>Budgetlope</title>
    <style>
      /* In-page splash: covers the gap between first paint and the app store
         being ready. Icon is dead-center to match the iOS launch images, so
         the handoff is seamless. Removed by App.tsx once the UI has mounted. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #fff;
        opacity: 1;
        transition: opacity 0.25s ease-out;
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      #splash.splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash svg {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 112px;
        height: 112px;
        transform: translate(-50%, -50%);
      }
      #splash .splash-name {
        position: absolute;
        top: calc(50% + 72px);
        left: 0;
        right: 0;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #0f5c48;
      }
      #splash .splash-spinner {
        position: absolute;
        top: calc(50% + 116px);
        left: 50%;
        width: 22px;
        height: 22px;
        margin-left: -11px;
        border: 2.5px solid #d9f2ea;
        border-top-color: #1a7f64;
        border-radius: 50%;
        opacity: 0;
        animation:
          splash-spin 0.8s linear infinite,
          splash-appear 0.3s ease-out 0.4s forwards;
      }
      /* Delayed fade-in: fast loads never flash a spinner */
      @keyframes splash-appear {
        to {
          opacity: 1;
        }
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
